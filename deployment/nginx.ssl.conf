server {
    listen 80;
    server_name trading.astroquantresearch.com;

    # Certbot HTTP-01 challenge / renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name trading.astroquantresearch.com;

    ssl_certificate     /etc/letsencrypt/live/trading.astroquantresearch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading.astroquantresearch.com/privkey.pem;

    # Docker's embedded DNS, short TTL so a recreated container's new IP is
    # picked up on the next request instead of being cached for the life of
    # the nginx process (this caused recurring 502s after redeploys).
    resolver 127.0.0.11 valid=10s;

    # API
    location /api/ {
        # proxy_pass with a variable host disables nginx's automatic prefix
        # stripping, so strip /api/ explicitly before forwarding.
        rewrite ^/api/(.*)$ /$1 break;
        set $backend_upstream backend-api:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard (PWA)
    location / {
        set $dashboard_upstream dashboard:3000;
        proxy_pass http://$dashboard_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IP allowlist option: uncomment and adjust to restrict dashboard/API access.
    # allow 203.0.113.0/24;
    # deny all;
}
