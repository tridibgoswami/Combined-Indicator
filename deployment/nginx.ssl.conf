server {
    listen 80;
    server_name trading.astroquantresearch.com;

    # Certbot HTTP-01 challenge / renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name trading.astroquantresearch.com;

    ssl_certificate     /etc/letsencrypt/live/trading.astroquantresearch.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading.astroquantresearch.com/privkey.pem;

    # API
    location /api/ {
        proxy_pass http://backend-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard (PWA)
    location / {
        proxy_pass http://dashboard:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # IP allowlist option: uncomment and adjust to restrict dashboard/API access.
    # allow 203.0.113.0/24;
    # deny all;
}
